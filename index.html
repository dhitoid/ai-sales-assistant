<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sales AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-enter { animation: slideDown 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-50 text-slate-800 min-h-screen pb-10">

    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 hidden w-max max-w-[90%]">
        <div id="toastMsg" class="bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg text-sm font-medium text-center">
            Pesan Notifikasi
        </div>
    </div>

    <div class="max-w-md mx-auto p-4 pt-10">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-600 text-white rounded-2xl mb-3 shadow-md">
                <i class="fa-solid fa-robot text-xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Sales AI Assistant</h1>
            <p class="text-sm text-slate-500 mt-1">Auto Follow-Up & Analisis Sentimen</p>
        </div>

        <div class="glass-card p-6 rounded-3xl shadow-sm border border-white/50 mb-6">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Riwayat Chat WhatsApp</label>
                <textarea id="chatInput" rows="6" placeholder="Paste obrolan WA di sini..." class="w-full p-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none transition-all"></textarea>
            </div>
            
            <button id="analyzeBtn" onclick="analyzeChat()" class="w-full bg-blue-600 text-white font-semibold py-3.5 rounded-2xl hover:bg-blue-700 transition duration-200 active:scale-[0.98] flex justify-center items-center gap-2 shadow-md shadow-blue-200">
                <i class="fa-solid fa-wand-magic-sparkles" id="btnIcon"></i>
                <span id="btnText">Analisis Chat Sekarang</span>
                <i class="fa-solid fa-circle-notch animate-spin hidden" id="loadingIcon"></i>
            </button>
        </div>

        <div id="resultCard" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-5 rounded-3xl shadow-sm border border-white/50 flex flex-col justify-center items-center text-center">
                    <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center mb-2">
                        <i class="fa-solid fa-face-smile text-slate-500 text-sm"></i>
                    </div>
                    <p class="text-[11px] text-slate-500 font-semibold uppercase tracking-wider mb-1">Status</p>
                    <p id="statusOutput" class="font-bold text-lg text-slate-800 leading-tight">-</p>
                </div>
                <div class="glass-card p-5 rounded-3xl shadow-sm border border-white/50 flex flex-col justify-center items-center text-center">
                    <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center mb-2">
                        <i class="fa-solid fa-calendar-day text-blue-500 text-sm"></i>
                    </div>
                    <p class="text-[11px] text-slate-500 font-semibold uppercase tracking-wider mb-1">Follow Up</p>
                    <p id="dateOutput" class="font-bold text-lg text-slate-800 leading-tight">-</p>
                </div>
            </div>

            <div class="glass-card p-5 rounded-3xl shadow-sm border border-white/50 relative group">
                <div class="flex justify-between items-center mb-3">
                    <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-pen-nib"></i> Draf Balasan AI
                    </p>
                    <button onclick="copyDraft()" class="text-blue-600 hover:text-blue-700 p-2 rounded-lg bg-blue-50 transition active:scale-90" title="Salin Draf">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                </div>
                <div id="draftOutput" class="text-sm text-slate-700 leading-relaxed bg-slate-50/50 p-4 rounded-2xl border border-slate-100"></div>
            </div>
        </div>
    </div>

    <script>
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.innerText = message;
            toastMsg.className = isError ? "bg-red-500 text-white px-6 py-3 rounded-full shadow-lg text-sm font-medium text-center" : "bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg text-sm font-medium text-center";
            toast.classList.remove('hidden'); toast.classList.add('toast-enter');
            setTimeout(() => { toast.classList.add('hidden'); toast.classList.remove('toast-enter'); }, 3000);
        }

        async function analyzeChat() {
            const chatText = document.getElementById('chatInput').value.trim();
            const btn = document.getElementById('analyzeBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const loadingIcon = document.getElementById('loadingIcon');
            const resultCard = document.getElementById('resultCard');

            if (!chatText) {
                showToast('Chat WA tidak boleh kosong!', true);
                return;
            }

            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btnText.innerText = "Menganalisis...";
            btnIcon.classList.add('hidden');
            loadingIcon.classList.remove('hidden');
            resultCard.classList.add('hidden');

            try {
                // Menggunakan relative URL ke Vercel Serverless Function Anda
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatText })
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'Gagal menganalisis.');

                const statusEl = document.getElementById('statusOutput');
                statusEl.innerText = result.status;
                
                const statusText = result.status.toLowerCase();
                if(statusText.includes('tertarik')) statusEl.className = "font-bold text-lg text-emerald-600 leading-tight";
                else if(statusText.includes('ragu')) statusEl.className = "font-bold text-lg text-amber-500 leading-tight";
                else statusEl.className = "font-bold text-lg text-red-500 leading-tight";

                document.getElementById('dateOutput').innerText = result.follow_up_date;
                document.getElementById('draftOutput').innerHTML = result.draft_reply.replace(/\n/g, '<br>');
                
                resultCard.classList.remove('hidden');
                showToast('Analisis selesai!');

            } catch (error) {
                showToast(error.message, true);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                btnText.innerText = "Analisis Chat Sekarang";
                btnIcon.classList.remove('hidden');
                loadingIcon.classList.add('hidden');
            }
        }

        function copyDraft() {
            const draftHtml = document.getElementById('draftOutput').innerHTML;
            const textToCopy = draftHtml.replace(/<br\s*[\/]?>/gi, '\n');
            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast('Draf disalin!');
            }).catch(() => {
                showToast('Gagal menyalin.', true);
            });
        }
    </script>
</body>
</html>
